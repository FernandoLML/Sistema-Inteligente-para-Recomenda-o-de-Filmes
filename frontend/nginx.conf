server {
    listen 3000;
    server_name localhost;

    # Serve os arquivos estáticos do React (Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Tratamento essencial para aplicações Single Page (SPA) com React Router
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o backend FastAPI
    location /api/ {
        # O nome 'backend' vem do nome do serviço definido no docker-compose.yml
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}